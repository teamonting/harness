services:
  chrome:
    image: selenium/standalone-chromium:150.0
    depends_on:
      - web
    environment:
      SE_OPTS: '--log-level WARNING'
      SE_NODE_GRID_URL: 'http://localhost:4444'
      SE_NODE_SESSION_TIMEOUT: '10'
    # Cannot use pipe operator in CMD.
    # healthcheck:
    #   test: ["CMD", "curl", "-fsS", "http://localhost:4444/wd/hub/status", "|", "jq", "'if .value.ready == true then empty else error() end'"]
    #   interval: 2s
    #   timeout: 2s
    #   retries: 5
    ports:
      - '4444:4444'
      - '7900:7900'
    shm_size: '2.5gb'

  web:
    build:
      context: ./
      dockerfile: web.dockerfile
    # volumes:
    #   - ./public/:/var/web/public/
    #   - ./public/static/:/var/web/public/static/
